<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(10, 8, 6, 0.85);
            color: #d4c8b0;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.3s;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay h1 {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 12px;
            color: #7ab648;
            text-shadow: 0 0 40px rgba(122, 182, 72, 0.3);
            margin-bottom: 20px;
        }

        #overlay p {
            font-size: 14px;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1px;
        }

        #crosshair::before {
            width: 2px;
            height: 24px;
            left: 11px;
            top: 0;
        }

        #crosshair::after {
            width: 24px;
            height: 2px;
            top: 11px;
            left: 0;
        }

        #info {
            position: fixed;
            bottom: 16px;
            left: 16px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 11px;
            font-family: 'Courier New', monospace;
            z-index: 5;
            pointer-events: none;
            display: none;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <h1>VOXEL</h1>
        <p>Click to play — WASD to move, Mouse to look</p>
    </div>
    <div id="crosshair"></div>
    <div id="info"></div>

    <script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>
    <script type="module">
        import * as THREE from 'three';

        /* ── Constants ── */
        const WORLD_W = 56, WORLD_H = 20, WORLD_D = 56;
        const PLAYER_H = 1.62, PLAYER_R = 0.28;
        const MOVE_SPEED = 5.5, GRAVITY = 22, JUMP_VEL = 7.5;
        const SENSITIVITY = 0.002;

        const B = { AIR: 0, GRASS: 1, DIRT: 2, STONE: 3, SAND: 4, SNOW: 5 };
        const B_COLOR = {
            [B.GRASS]: 0x5d9a34, [B.DIRT]: 0x86643a, [B.STONE]: 0x808080,
            [B.SAND]: 0xc9b56e, [B.SNOW]: 0xe8e4de,
        };

        /* ── Value noise ── */
        function hash2(x, z) {
            let n = (x * 374761393 + z * 668265263) | 0;
            n = ((n ^ (n >> 13)) * 1274126177) | 0;
            return (n & 0x7fffffff) / 0x7fffffff;
        }
        function smoothNoise(x, z) {
            const ix = Math.floor(x), iz = Math.floor(z);
            const fx = x - ix, fz = z - iz;
            const u = fx * fx * (3 - 2 * fx), v = fz * fz * (3 - 2 * fz);
            const a = hash2(ix, iz), b = hash2(ix + 1, iz);
            const c = hash2(ix, iz + 1), d = hash2(ix + 1, iz + 1);
            return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
        }
        function fbm(x, z, oct = 4) {
            let v = 0, a = 1, f = 1, m = 0;
            for (let i = 0; i < oct; i++) { v += smoothNoise(x * f, z * f) * a; m += a; a *= 0.5; f *= 2.1; }
            return v / m;
        }

        /* ── World data ── */
        const world = new Uint8Array(WORLD_W * WORLD_H * WORLD_D);
        const idx = (x, y, z) => x * WORLD_H * WORLD_D + y * WORLD_D + z;
        const getB = (x, y, z) => (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H || z < 0 || z >= WORLD_D) ? B.AIR : world[idx(x, y, z)];
        const setB = (x, y, z, t) => { if (x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H && z >= 0 && z < WORLD_D) world[idx(x, y, z)] = t; };

        function generateWorld() {
            for (let x = 0; x < WORLD_W; x++) {
                for (let z = 0; z < WORLD_D; z++) {
                    const h = Math.floor(fbm(x * 0.055 + 0.3, z * 0.055 + 0.7) * 10 + 3);
                    const height = Math.min(h, WORLD_H - 5);
                    for (let y = 0; y <= height; y++) {
                        if (y === height) {
                            setB(x, y, z, height <= 3 ? B.SAND : (height >= 12 ? B.SNOW : B.GRASS));
                        } else if (y > height - 3) {
                            setB(x, y, z, B.DIRT);
                        } else {
                            setB(x, y, z, B.STONE);
                        }
                    }
                }
            }
        }

        /* ── Face exposure check ── */
        function exposed(x, y, z) {
            return getB(x - 1, y, z) === 0 || getB(x + 1, y, z) === 0 || getB(x, y - 1, z) === 0 ||
                getB(x, y + 1, z) === 0 || getB(x, y, z - 1) === 0 || getB(x, y, z + 1) === 0;
        }

        /* ── Three.js setup ── */
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const skyColor = 0x8ec5d6;
        scene.background = new THREE.Color(skyColor);
        scene.fog = new THREE.FogExp2(skyColor, 0.022);

        const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.08, 120);

        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        const sun = new THREE.DirectionalLight(0xfff0d0, 0.9);
        sun.position.set(30, 50, 20);
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0xc0d8f0, 0.25);
        fill.position.set(-20, 20, -30);
        scene.add(fill);

        const sunGeo = new THREE.SphereGeometry(3, 16, 16);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffeebb });
        const sunMesh = new THREE.Mesh(sunGeo, sunMat);
        sunMesh.position.set(80, 90, 50);
        scene.add(sunMesh);

        /* ── Build instanced meshes ── */
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);

        function buildWorld() {
            const groups = {};
            for (let x = 0; x < WORLD_W; x++)
                for (let y = 0; y < WORLD_H; y++)
                    for (let z = 0; z < WORLD_D; z++) {
                        const t = getB(x, y, z);
                        if (t === B.AIR || !exposed(x, y, z)) continue;
                        (groups[t] || (groups[t] = [])).push(x, y, z);
                    }

            const mat4 = new THREE.Matrix4();
            for (const [ts, arr] of Object.entries(groups)) {
                const count = arr.length / 3;
                const mat = new THREE.MeshLambertMaterial({ color: B_COLOR[+ts] });
                const im = new THREE.InstancedMesh(boxGeo, mat, count);
                for (let i = 0; i < count; i++) {
                    mat4.setPosition(arr[i * 3] + 0.5, arr[i * 3 + 1] + 0.5, arr[i * 3 + 2] + 0.5);
                    im.setMatrixAt(i, mat4);
                }
                im.instanceMatrix.needsUpdate = true;
                scene.add(im);
            }
        }

        generateWorld();
        buildWorld();

        /* ── Player state ── */
        const player = { x: WORLD_W / 2, y: 20, z: WORLD_D / 2, yaw: 0, pitch: 0, vy: 0, grounded: false };
        for (let y = WORLD_H - 1; y >= 0; y--) {
            if (getB(Math.floor(player.x), y, Math.floor(player.z)) !== B.AIR) {
                player.y = y + 1 + PLAYER_H;
                break;
            }
        }

        /* ── Collision ── */
        function solid(bx, by, bz) { return getB(bx, by, bz) !== B.AIR; }

        function collides(px, py, pz) {
            const feet = py - PLAYER_H;
            const x0 = Math.floor(px - PLAYER_R), x1 = Math.floor(px + PLAYER_R);
            const z0 = Math.floor(pz - PLAYER_R), z1 = Math.floor(pz + PLAYER_R);
            const y0 = Math.floor(feet), y1 = Math.floor(py);
            for (let bx = x0; bx <= x1; bx++)
                for (let bz = z0; bz <= z1; bz++)
                    for (let by = y0; by <= y1; by++)
                        if (solid(bx, by, bz)) return true;
            return false;
        }

        /* ── Input — use window.addEventListener explicitly for module scope ── */
        const keys = {};
        window.addEventListener('keydown', e => { keys[e.code] = true; });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        const overlay = document.getElementById('overlay');
        const crosshair = document.getElementById('crosshair');
        const info = document.getElementById('info');
        let locked = false;

        overlay.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('pointerlockchange', () => {
            locked = document.pointerLockElement === renderer.domElement;
            overlay.classList.toggle('hidden', locked);
            crosshair.style.display = locked ? 'block' : 'none';
            info.style.display = locked ? 'block' : 'none';
        });
        document.addEventListener('mousemove', e => {
            if (!locked) return;
            player.yaw += e.movementX * SENSITIVITY;
            player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch - e.movementY * SENSITIVITY));
        });

        /* ── Main loop ── */
        let prev = performance.now();
        let frameCount = 0, fps = 0, fpsTimer = 0;

        function loop(now) {
            requestAnimationFrame(loop);
            const dt = Math.min((now - prev) / 1000, 0.05);
            prev = now;

            frameCount++;
            fpsTimer += dt;
            if (fpsTimer >= 0.5) { fps = Math.round(frameCount / fpsTimer); frameCount = 0; fpsTimer = 0; }

            if (!locked) { renderer.render(scene, camera); return; }

            /* Movement — explicit forward/right vectors from yaw */
            const fwdX = Math.sin(player.yaw);
            const fwdZ = -Math.cos(player.yaw);
            const rightX = Math.cos(player.yaw);
            const rightZ = Math.sin(player.yaw);

            let dx = 0, dz = 0;
            if (keys['KeyW']) { dx += fwdX; dz += fwdZ; }
            if (keys['KeyS']) { dx -= fwdX; dz -= fwdZ; }
            if (keys['KeyA']) { dx -= rightX; dz -= rightZ; }
            if (keys['KeyD']) { dx += rightX; dz += rightZ; }

            const len = Math.sqrt(dx * dx + dz * dz);
            if (len > 0) {
                dx = dx / len * MOVE_SPEED * dt;
                dz = dz / len * MOVE_SPEED * dt;
            }

            // Per-axis collision
            if (!collides(player.x + dx, player.y, player.z)) player.x += dx;
            if (!collides(player.x, player.y, player.z + dz)) player.z += dz;

            // Gravity + jump
            player.grounded = collides(player.x, player.y - 0.05, player.z);
            if (keys['Space'] && player.grounded) player.vy = JUMP_VEL;

            player.vy -= GRAVITY * dt;
            const newY = player.y + player.vy * dt;
            if (!collides(player.x, newY, player.z)) {
                player.y = newY;
            } else {
                if (player.vy < 0) player.grounded = true;
                player.vy = 0;
            }

            if (player.y < -10) {
                player.x = WORLD_W / 2; player.z = WORLD_D / 2; player.y = 20; player.vy = 0;
            }

            // Camera
            camera.position.set(player.x, player.y, player.z);
            camera.lookAt(
                player.x + fwdX * Math.cos(player.pitch),
                player.y + Math.sin(player.pitch),
                player.z + fwdZ * Math.cos(player.pitch)
            );

            info.textContent = `FPS ${fps}  |  ${player.x.toFixed(1)}, ${player.y.toFixed(1)}, ${player.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }

        requestAnimationFrame(loop);

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>

</html>
